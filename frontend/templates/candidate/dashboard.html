{% extends "base.html" %}
{% block title %}Dashboard – JobPortal{% endblock %}

{% block extra_css %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --navy:     #1E3A6E;
  --navy-dk:  #122447;
  --navy-lt:  #EEF3FB;
  --pink-primary:   #d91b5c;
  --pink-soft:      #f472b6;
  --pink-warm:      #ec4899;
  --pink-light:     #f8b4d7;
  --pink-lt:        #fdf2f8;
  --bg:       #fcfaf7;
  --surface:  #FFFFFF;
  --border:   #e2e2e2;
  --ink:      #1a1a1a;
  --sub:      #4a5568;
  --muted:    #666666;
  --green:    #1A7A4A;
  --green-lt: #E6F4EE;
  --amber:    #B45309;
  --amber-lt: #FEF3C7;
  --blue:     #1E3A6E;
  --blue-lt:  #EEF3FB;
  --r:        8px;
}

* { box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); }

.bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 16px 40px;
}
.t {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  overflow: hidden;
}
.c3  { grid-column: span 3; }
.c4  { grid-column: span 4; }
.c5  { grid-column: span 5; }
.c6  { grid-column: span 6; }
.c7  { grid-column: span 7; }
.c8  { grid-column: span 8; }
.c9  { grid-column: span 9; }
.c12 { grid-column: span 12; }

.hero {
  grid-column: span 12;
  background: #E8398A;
  color: #fff;
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  border: none;
  border-radius: var(--r);
  position: relative;
  overflow: hidden;
}
.h-name { font-family: 'Merriweather', serif; font-size: 1.6rem; font-weight: 900; margin-bottom: 4px; line-height: 1.15; letter-spacing: -0.3px; }
.h-sub { color: rgba(255,255,255,0.75); font-size: 0.85rem; }
.h-sub strong { color: #fff; font-weight: 700; }
.h-btns { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
.btn-primary { background: #fff; color: #E8398A; border: none; padding: 8px 18px; border-radius: 5px; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: background .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; letter-spacing: .2px; }
.btn-primary:hover { background: #d42f7c; color: #fff; text-decoration: none; }
.btn-ghost { background: transparent; color: #fff; border: 1.5px solid #fff; padding: 8px 18px; border-radius: 5px; font-weight: 600; font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: all .15s; font-family: 'DM Sans', sans-serif; }
.btn-ghost:hover { border-color: #d42f7c; color: #fff; text-decoration: none; }

.stat-tile { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; min-height: 96px; padding: 14px 10px; position: relative; }
.stat-tile::after { content: ''; position: absolute; bottom: 0; left: 18px; right: 18px; height: 3px; border-radius: 2px; background: var(--border); }
.stat-tile.s-red::after   { background: #E8398A; }
.stat-tile.s-blue::after  { background: #E8398A; }
.stat-tile.s-green::after { background: var(--green); }
.stat-num { font-family: 'Merriweather', serif; font-size: 2.4rem; font-weight: 900; line-height: 1; }
.stat-lbl { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; font-weight: 700; }
.stat-hint { font-size: .72rem; color: var(--sub); margin-top: 3px; }

.th { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.th-left { display: flex; align-items: center; gap: 7px; }
.th-title { font-family: 'Merriweather', serif; font-size: .92rem; font-weight: 700; color: var(--ink); letter-spacing: -.2px; }
.th a { font-size: .73rem; font-weight: 700; color: #E8398A; text-decoration: none; }
.th a:hover { text-decoration: underline; }

.score-wrap { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
.ring { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
.ring svg { transform: rotate(-90deg); }
.ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-num   { font-family: 'Merriweather', serif; font-size: 1.7rem; font-weight: 900; line-height: 1; }
.ring-denom { font-size: .6rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.cat-bars { flex: 1; min-width: 160px; }
.cat-row  { margin-bottom: 9px; }
.cr-top   { display: flex; justify-content: space-between; margin-bottom: 3px; }
.cr-name  { font-size: .73rem; font-weight: 700; color: var(--ink); }
.cr-val   { font-size: .73rem; font-weight: 700; color: var(--muted); }
.bar-track { background: var(--border); border-radius: 999px; height: 5px; }
.bar-fill  { height: 100%; border-radius: 999px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }
.b-exp  { background: #E8398A; }
.b-proj { background: #E8398A; }
.b-sk   { background: #E8398A; }
.b-edu  { background: #E8398A; }

/* ── ML VERDICT TILE ── */
.verdict-card { border-radius: 6px; padding: 12px 14px; border: 1px solid; }
.verdict-empty { text-align: center; padding: 16px 10px; color: var(--muted); font-size: .82rem; }
.verdict-empty strong { display: block; font-size: .84rem; color: var(--ink); margin-bottom: 4px; }

.job-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.job-row:last-child { border-bottom: none; padding-bottom: 0; }
.job-rank { font-family: 'Merriweather', serif; font-size: 1.1rem; font-weight: 900; color: var(--border); width: 22px; text-align: center; flex-shrink: 0; line-height: 1; }
.job-rank.top { color: #E8398A; }
.job-info { flex: 1; min-width: 0; }
.job-title { font-weight: 700; font-size: .83rem; color: var(--ink); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-meta  { font-size: .7rem; color: var(--muted); display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.job-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.match-pill { font-size: .68rem; font-weight: 800; padding: 2px 8px; border-radius: 3px; white-space: nowrap; letter-spacing: .3px; }
.mp-high { background: var(--green-lt); color: var(--green); }
.mp-mid  { background: var(--amber-lt); color: var(--amber); }
.mp-low  { background: var(--red-lt);   color: #E8398A; }
.mp-neu  { background: var(--bg);       color: var(--sub); }
.btn-view { font-size: .68rem; font-weight: 700; color: #E8398A; text-decoration: none; }
.btn-view:hover { text-decoration: underline; }

.gap-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.gap-pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 3px; font-size: .71rem; font-weight: 700; }
.gc { background: var(--red-lt);   color: #E8398A; }
.gm { background: var(--amber-lt); color: var(--amber); }
.gn { background: var(--blue-lt);  color: #E8398A; }
.gap-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

.course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.course-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; text-decoration: none; transition: border-color .15s, background .15s, transform .1s; background: var(--bg); }
.course-card:hover { border-color: #E8398A; background: var(--red-lt); text-decoration: none; transform: translateY(-1px); }
.cc-skill { font-weight: 700; font-size: .8rem; color: var(--ink); margin-bottom: 2px; }
.cc-level { font-size: .68rem; font-weight: 700; }
.cc-arrow { margin-left: auto; color: #E8398A; font-weight: 700; flex-shrink: 0; font-size: .73rem; white-space: nowrap; }

.pbar-track { background: var(--border); border-radius: 999px; height: 6px; margin: 7px 0 4px; }
.pbar-fill  { height: 100%; border-radius: 999px; background: #E8398A; transition: width 1s ease; }
.ps-row { display: flex; align-items: center; justify-content: space-between; font-size: .73rem; padding: 3px 0; }
.ps-lbl { color: var(--sub); }
.ps-ok  { color: var(--green); font-weight: 700; display: flex; align-items: center; gap: 2px; }
.ps-no  { color: #E8398A;   font-weight: 700; display: flex; align-items: center; gap: 2px; }
.recalc-btn { background: #E8398A; color: #fff; border: none; padding: 9px 16px; border-radius: 5px; font-weight: 700; font-size: .79rem; cursor: pointer; transition: background .15s; display: inline-flex; align-items: center; gap: 6px; width: 100%; justify-content: center; margin-top: 12px; font-family: 'DM Sans', sans-serif; }
.recalc-btn:hover { background: #d42f7c; }
.recalc-btn:disabled { opacity: .5; cursor: not-allowed; }

.mode-toggle { display:flex; background:var(--bg); border-radius:999px; padding:3px; border:1px solid var(--border); gap:2px; }
.mode-btn { padding:4px 12px; border-radius:999px; border:none; cursor:pointer; font-size:.72rem; font-weight:700; font-family:'DM Sans',sans-serif; transition:all .15s; }
.mode-btn.active { background:#E8398A; color:#fff; }
.mode-btn.inactive { background:transparent; color:var(--muted); }
.empty { text-align: center; padding: 18px 10px; color: var(--muted); font-size: .82rem; }
.empty strong { display: block; font-size: .84rem; color: var(--ink); margin-bottom: 3px; }

.spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

@media(max-width: 960px) {
  .c4, .c5, .c6, .c7, .c8, .c9 { grid-column: span 12; }
  .c3 { grid-column: span 6; }
}
@media(max-width: 540px) {
  .c3 { grid-column: span 12; }
  .course-grid { grid-template-columns: 1fr; }
}
</style>
{% endblock %}

{% block content %}
<div id="db-root" style="padding:60px;text-align:center;color:#888">Loading...</div>
{% endblock %}

{% block extra_js %}
<script>
document.querySelector('.page-content').style.padding='0';
document.querySelector('.page-content > .container').style.maxWidth='none';
document.querySelector('.page-content > .container').style.padding='0';

const API=`https://jobportal-api-a2dcfwh8dfcaesf4.southindia-01.azurewebsites.net/api`, token=Auth.getToken();
if(!token) window.location.href='/login';

const IC = path => `/static/icons/${path}`;

// ── ML verdict stored after recalculate ─────────────────────────────────────
let _mlVerdict = null;
let _jobMode = 'all';

const VERDICT_CONFIG = {
  green: {
    bg: '#9d174d', border: '#831240', text: '#fff',
    tagline: "You're well-positioned. Recruiters are likely to shortlist you.",
    imgIcon: 'verdict-strong.png'
  },
  yellow: {
    bg: '#E8398A', border: '#d42f7c', text: '#fff',
    tagline: "You have a real shot. A few more skills could push you to the top.",
    imgIcon: 'verdict-competitive.png'
  },
  orange: {
    bg: '#f9a8d4', border: '#f472b6', text: '#831240',
    tagline: "You may get interviews but face tough competition. Focus on your skill gaps now.",
    imgIcon: 'verdict-borderline.png'
  },
  red: {
    bg: '#fce7f3', border: '#fbcfe8', text: '#9d174d',
    tagline: "Significant gaps exist. Build your skills before applying actively.",
    imgIcon: 'verdict-notyet.png'
  },
};

async function loadDashboard(mode){
  mode = mode || _jobMode;
  _jobMode = mode;
  try{
    const res=await fetch(`${API}/candidate/dashboard?mode=${mode}`,{headers:{Authorization:`Bearer ${token}`}});
    const json=await res.json();
    if(!res.ok) throw new Error(json.detail||'Failed to load');
    _mlVerdict = json.data?.score?.ml_verdict ?? null;
    render(json.data);
  }catch(err){
    document.getElementById('db-root').innerHTML=`<div style="padding:40px;text-align:center;color:red">${err.message}</div>`;
  }
}

function icon(name, size=18){
  return `<img src="${IC(name+'.png')}" width="${size}" height="${size}" style="object-fit:contain;flex-shrink:0" onerror="this.style.display='none'">`;
}

function renderVerdict(v){
  if(!v) return `<div class="verdict-empty"><strong>Not calculated yet</strong>Click Calculate Score to get your AI market prediction</div>`;
  const c = VERDICT_CONFIG[v.color] || VERDICT_CONFIG.red;
  return `
    <div class="verdict-card" style="background:${c.bg};border-color:${c.border}">
      <div style="display:flex;align-items:center;gap:12px">
        <img src="${IC(c.imgIcon)}" width="72" height="72" style="object-fit:contain;flex-shrink:0;align-self:center;margin-right:2px" onerror="this.style.display='none'">
        <div style="flex:1;min-width:0">
          <div style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:${c.text};opacity:.75;margin-bottom:2px">AI Market Prediction</div>
          <div style="font-family:'Merriweather',serif;font-size:.92rem;font-weight:900;color:${c.text};margin-bottom:3px">${v.label}</div>
          <div style="font-size:.7rem;color:${c.text};opacity:.8;line-height:1.45">${c.tagline}</div>
        </div>
      </div>
      ${v.note ? `<div style="font-size:.66rem;color:${c.text};opacity:.7;margin-top:8px;padding-top:8px;border-top:1px solid ${c.border}">${v.note}</div>` : ''}
    </div>`;
}

function render(data){
  const S=data.score, gaps=data.gaps||[], jobs=data.top_jobs||[], pct=data.profile_complete_pct||0;
  const courses = gaps.filter(g=>g.udemy_link).slice(0,5);

  document.getElementById('db-root').innerHTML=`
  <div class="bento">

    <div class="t hero">
      <div>
        <div class="h-name" style="display:flex;align-items:center;gap:8px">Hello, ${data.full_name?.split(' ')[0]||'there'} <img src="/static/icons/hi.png?v=2" width="42" height="42" style="display:inline-block;vertical-align:middle;flex-shrink:0" onerror="this.outerHTML='👋'"></div>
        <div class="h-sub">${data.target_role?`Searching for: <strong>${data.target_role}</strong>`:'Complete your profile to unlock job matches'}</div>
      </div>
      <div class="h-btns">
        <button class="btn-primary" id="recalc-btn" onclick="recalculate()">${icon('refresh',15)} Calculate Score</button>
        <a href="/candidate/profile" class="btn-ghost">Edit Profile</a>
      </div>
    </div>

    <div class="t c4 stat-tile s-red">
      <div class="stat-num" style="color:${scolor(S?.overall)}">${S?.overall??'–'}</div>
      <div class="stat-lbl">Readiness Score</div>
      <div class="stat-hint">${S?slabel(S.overall):'Not calculated yet'}</div>
    </div>
    <div class="t c4 stat-tile s-red">
      <div class="stat-num" style="color:${gaps.filter(g=>g.gap_level==='critical').length>0?'#E8398A':'#1A7A4A'}">${gaps.filter(g=>g.gap_level==='critical').length}</div>
      <div class="stat-lbl">Critical Gaps</div>
      <div class="stat-hint">${gaps.length} total skill gaps</div>
    </div>
    <div class="t c4 stat-tile s-blue">
      <div class="stat-num" style="color:#E8398A">${jobs.length}</div>
      <div class="stat-lbl">Job Matches</div>
      <div class="stat-hint">Top: ${jobs[0]?jobs[0].match_score+'%':'–'}</div>
    </div>

    <div class="t c8">
      <div class="th">
        <div class="th-left">${icon('score')} <span class="th-title">Score Breakdown</span></div>
      </div>
      ${S?renderScore(S):`<div style="text-align:center;padding:28px 12px"><img src="/static/icons/empty-score.png" width="120" height="120" style="display:block;margin:0 auto;object-fit:contain;margin-bottom:10px;opacity:.93" onerror="this.style.display='none'"><div style="font-weight:700;font-size:.85rem;color:#111;margin-bottom:4px">No score yet</div><div style="font-size:.78rem;color:#888">Click Calculate Score to analyse your profile</div></div>`}
      <div style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px" id="verdict-tile">
        <div style="font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Market Verdict</div>
        ${renderVerdict(_mlVerdict)}
      </div>
    </div>

    <div class="t c4">
      <div class="th">
        <div class="th-left">${icon('profile')} <span class="th-title">Profile</span></div>
        <a href="/candidate/profile">Edit →</a>
      </div>
      <div style="font-size:.73rem;color:var(--muted);font-weight:700">${pct}% complete</div>
      <div class="pbar-track"><div class="pbar-fill" style="width:0%" data-target="${pct}%"></div></div>
      <div style="margin-top:8px">
        ${ps('Basic Info',   data.has_basic)}
        ${ps('Education',    data.has_education)}
        ${ps('Experience',   data.has_experience)}
        ${ps('Skills',       data.has_skills)}
        ${ps('Resume',       data.has_resume)}
        ${ps('Preferences',  data.has_preferences)}
      </div>
      <button class="recalc-btn" id="recalc-btn2" onclick="recalculate()">${icon('refresh',14)} Recalculate Score</button>
    </div>

    <div class="t c8">
      <div class="th">
        <div class="th-left">${icon('jobs')} <span class="th-title">Top Job Matches</span></div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="mode-toggle">
            <button class="mode-btn ${_jobMode==='targeted'?'active':'inactive'}" onclick="switchMode('targeted')">My Role</button>
            <button class="mode-btn ${_jobMode==='all'?'active':'inactive'}" onclick="switchMode('all')">All Jobs</button>
          </div>
          <a href="/jobs">See all →</a>
        </div>
      </div>
      ${jobs.length?renderJobs(jobs):`<div style="text-align:center;padding:28px 12px"><img src="/static/icons/empty-match.png" width="120" height="120" style="display:block;margin:0 auto;object-fit:contain;margin-bottom:10px;opacity:.93" onerror="this.style.display='none'"><div style="font-weight:700;font-size:.85rem;color:#111;margin-bottom:4px">No matches yet</div><div style="font-size:.78rem;color:#888">Calculate your score to see ranked jobs</div></div>`}
    </div>

    <div class="t c4">
      <div class="th">
        <div class="th-left">${icon('gaps')} <span class="th-title">Skill Gaps</span></div>
      </div>
      ${gaps.length?`<div class="gap-wrap">${renderGaps(gaps)}</div>`:`<div class="empty"><strong>No gaps found</strong>Calculate score first</div>`}
    </div>

    <div class="t c12">
      <div class="th">
        <div class="th-left">${icon('courses')} <span class="th-title">Recommended Courses</span></div>
      </div>
      ${courses.length?renderCourses(courses):`<div style="text-align:center;padding:28px 12px"><img src="/static/icons/empty-courses.png" width="120" height="120" style="display:block;margin:0 auto;object-fit:contain;margin-bottom:10px;opacity:.93" onerror="this.style.display='none'"><div style="font-weight:700;font-size:.85rem;color:#111;margin-bottom:4px">No recommendations yet</div><div style="font-size:.78rem;color:#888">Calculate your score to get personalised courses</div></div>`}
    </div>

  </div>`;

  setTimeout(animateBars, 80);
}

const scolor = v => !v&&v!==0?'#888':v>=70?'#9d174d':v>=40?'#E8398A':'#f9a8d4';
const slabel = v => v>=70?'Strong profile ✓':v>=40?'Developing':'Needs improvement';

function renderScore(s){
  const o=s.overall||0, circ=2*Math.PI*48, offset=circ-(o/100)*circ, col=scolor(o);
  return `<div class="score-wrap">
    <div class="ring">
      <svg width="100" height="100" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="48" fill="none" stroke="var(--border)" stroke-width="8"/>
        <circle cx="55" cy="55" r="48" fill="none" stroke="${col}" stroke-width="8"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ}" stroke-linecap="round"
          style="transition:stroke-dashoffset 1.2s ease" data-dash="${offset}"/>
      </svg>
      <div class="ring-text">
        <div class="ring-num" style="color:${col}">${o}</div>
        <div class="ring-denom">/ 100</div>
      </div>
    </div>
    <div class="cat-bars">
      ${bar('Experience',s.experience||0,'b-exp')}
      ${bar('Projects',  s.projects  ||0,'b-proj')}
      ${bar('Skills',    s.skills    ||0,'b-sk')}
      ${bar('Education', s.education ||0,'b-edu')}
    </div>
  </div>`;
}

function bar(lbl,val,cls){
  return `<div class="cat-row">
    <div class="cr-top"><span class="cr-name">${lbl}</span><span class="cr-val">${val}</span></div>
    <div class="bar-track"><div class="bar-fill ${cls}" style="width:0%" data-target="${val}%"></div></div>
  </div>`;
}

function ps(lbl, has){
  const ok = has ? `<span class="ps-ok">${icon('check',12)} Done</span>` : `<span class="ps-no">${icon('cross',12)} Missing</span>`;
  return `<div class="ps-row"><span class="ps-lbl">${lbl}</span>${ok}</div>`;
}

function renderJobs(jobs){
  return jobs.slice(0,6).map((j,i)=>{
    const m=j.match_score||0;
    const cls = m>=70?'mp-high':m>=50?'mp-mid':m>=30?'mp-low':'mp-neu';
    const sal = j.salary_min?`₹${Math.round(j.salary_min/1000)}k–${Math.round(j.salary_max/1000)}k`:'';
    return `<div class="job-row">
      ${i===0?`<img src="/static/icons/first.png" width="26" height="26" style="object-fit:contain;flex-shrink:0" onerror="this.outerHTML='<div class=\\'job-rank top\\'>1</div>'">`
:i===1?`<img src="/static/icons/second.png" width="26" height="26" style="object-fit:contain;flex-shrink:0" onerror="this.outerHTML='<div class=\\'job-rank top\\'>2</div>'">`
:i===2?`<img src="/static/icons/third.png" width="26" height="26" style="object-fit:contain;flex-shrink:0" onerror="this.outerHTML='<div class=\\'job-rank top\\'>3</div>'">`
:`<div class="job-rank">${i+1}</div>`}
      <div class="job-info">
        <div class="job-title">${j.title}</div>
        <div class="job-meta">
          ${icon('location',11)}<span>${j.city||'Remote'}</span>
          ${icon('time',11)}<span>${j.job_type||''}</span>
          ${sal?icon('salary',11)+'<span>'+sal+'</span>':''}
        </div>
      </div>
      <div class="job-right">
        <span class="match-pill ${cls}">${m}% match</span>
        <a href="/jobs/${j.job_id}" class="btn-view">View →</a>
      </div>
    </div>`;
  }).join('');
}

function renderGaps(gaps){
  const sorted = [...gaps.filter(g=>g.gap_level==='critical'),...gaps.filter(g=>g.gap_level!=='critical')].slice(0,15);
  const cls = {critical:'gc', moderate:'gm', minor:'gn'};
  return sorted.map(g=>`<span class="gap-pill ${cls[g.gap_level]||'gn'}"><span class="gap-dot"></span>${g.skill_name}</span>`).join('');
}

function renderCourses(courses){
  const lvlcls = {critical:'mp-high', moderate:'mp-mid', minor:'mp-neu'};
  return `<div class="course-grid">${courses.map(g=>`
    <a href="${g.udemy_link}" target="_blank" class="course-card">
      ${icon('courses',20)}
      <div style="flex:1;min-width:0">
        <div class="cc-skill">${g.skill_name}</div>
        <div class="cc-level"><span class="match-pill ${lvlcls[g.gap_level]||'mp-neu'}">${g.gap_level} gap</span></div>
      </div>
      <div class="cc-arrow">Udemy →</div>
    </a>`).join('')}
  </div>`;
}

function animateBars(){
  document.querySelectorAll('.bar-fill[data-target], .pbar-fill[data-target]').forEach(el=>setTimeout(()=>el.style.width=el.dataset.target,50));
  document.querySelectorAll('circle[data-dash]').forEach(el=>setTimeout(()=>el.style.strokeDashoffset=el.dataset.dash,50));
}

async function recalculate(){
  const btns=[document.getElementById('recalc-btn'),document.getElementById('recalc-btn2')];
  btns.forEach(b=>{if(b){b.disabled=true;b.innerHTML='<span class="spinner"></span> Analyzing...';}});
  try{
    const res=await fetch(`${API}/scoring/calculate`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'}});
    const j=await res.json();
    if(!res.ok) throw new Error(j.detail||'Failed');
    // ── Capture ml_verdict and update tile immediately ──────────────────────
    _mlVerdict = j.data?.ml_verdict ?? null;
    const vt = document.getElementById('verdict-tile');
    if(vt) vt.innerHTML = `
      <div style="font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Market Verdict</div>
      ${renderVerdict(_mlVerdict)}`;
    await loadDashboard();
  }catch(err){
    alert('Error: '+err.message);
    btns.forEach(b=>{if(b){b.disabled=false;b.innerHTML=icon('refresh',15)+' Recalculate Score';}});
  }
}

function switchMode(mode){
  _jobMode = mode;
  loadDashboard(mode);
}

loadDashboard();
</script>
{% endblock %}
